name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mcp_config: |
            {
              "mcpServers": {
                  "context7": {
                      "command": "npx",
                      "args": ["-y", "@upstash/context7-mcp"]
                  },
                  "grep": {
                    "url": "https://mcp.grep.app"
                  }
              }
            }
          allowed_tools: "Bash(*),Bash(npm install),Bash(npm run review),Bash(npm run),Bash(npm test),Bash(npm run check),Bash(npm run check:fix),Bash(npm run build),mcp__context7__resolve-library-id,mcp__context7__get-library-docs"
          custom_instructions: |
            "Shippie is an automated code review agent that runs in a CI/CD pipeline. It is a TypeScript project built on the flue agent framework (https://github.com/withastro/flue), run with Node and npm. It uses flue's built-in (pi) tools and the Model Context Protocol for external tools."
