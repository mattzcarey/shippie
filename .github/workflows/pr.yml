name: Shippie 🚢 CI

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        # npm install (not npm ci): the lockfile is generated on macOS and lacks
        # Linux-only optional deps (@emnapi/*), which makes `npm ci` EUSAGE here.
        run: npm install --no-audit --no-fund

      - name: Lint check
        run: npm run check

      - name: Type check
        run: npm run check:types

      - name: Build (flue)
        run: npm run build

      - name: Unit tests
        run: npm test

  review:
    # Dogfood: Shippie reviews its own PR. Non-blocking.
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Shippie self-review 🚢
        uses: ./
        continue-on-error: true
        with:
          MODEL: openai/gpt-5.5
          THINKING_LEVEL: high
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
